<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acelera Imob - Captura de Leads & CRM Kanban</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Capture leads altamente qualificados para o mercado imobiliário e gerencie-os através de um painel Kanban interativo com a plataforma Acelera Imob.">
  <meta name="keywords" content="crm imobiliario, capturar leads, kanban imobiliario, aceleraimob, funil de vendas, gestao de leads">
  <meta name="author" content="Acelera Imob">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Custom CSS (Glows, Print, Scrollbar) -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- React & ReactDOM (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (Para JSX em tempo de execução no navegador) -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Custom Theme Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              bg: '#050c18',          // Fundo azul muito escuro
              card: '#0a162a',        // Cards azul um pouco mais claro
              cardHover: '#0e1d37',   // Hover dos cards
              border: '#152945',      // Borda sutil de divisão
              borderGlow: '#22d3ee',  // Ciano glow
              cyan: '#00f0ff',        // Ciano primário
              green: '#10b981',       // Verde sucesso (Agressivo)
              yellow: '#f59e0b',      // Amarelo/Dourado (Moderado)
              red: '#ef4444',         // Vermelho alerta (Conservador)
              textMuted: '#94a3b8',   // Cinza para textos secundários
            }
          },
          boxShadow: {
            'glow-cyan': '0 0 15px rgba(0, 240, 255, 0.2)',
            'glow-cyan-lg': '0 0 25px rgba(0, 240, 255, 0.35)',
            'glow-green': '0 0 15px rgba(16, 185, 129, 0.25)',
            'glow-red': '0 0 15px rgba(239, 68, 68, 0.25)',
            'glow-yellow': '0 0 15px rgba(245, 158, 11, 0.25)',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-bg text-gray-100 font-sans min-h-screen selection:bg-brand-cyan/30 selection:text-white">
  
  <!-- Root Container for React -->
  <div id="root">
    <!-- Loader Skeleton inicial antes do React montar -->
    <div class="flex flex-col items-center justify-center min-h-screen">
      <div class="relative w-20 h-20">
        <div class="absolute inset-0 rounded-full border-4 border-brand-border"></div>
        <div class="absolute inset-0 rounded-full border-4 border-t-brand-cyan animate-spin"></div>
      </div>
      <p class="mt-4 text-brand-cyan font-outfit font-semibold tracking-wider animate-pulse">Carregando Acelera Imob CRM...</p>
    </div>
  </div>

  <!-- React Application Core Logic -->
  <script type="text/babel" src="app.js?v=1.3"></script>
</body>
</html>
